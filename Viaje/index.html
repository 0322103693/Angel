<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
  />
  <title>Viaje de amor 💖</title>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap');

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: 'Quicksand', sans-serif;
      background: #000;
    }

    body {
      position: relative;
      color: white;
      background:
        radial-gradient(circle at center, rgba(255, 0, 128, 0.10) 0%, rgba(20, 0, 20, 0.35) 18%, rgba(0,0,0,0.95) 55%, #000 100%),
        linear-gradient(to bottom, #070008, #000);
    }

    .screen {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    /* INICIO */
    #startScreen {
      z-index: 50;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 22px;
      background:
        radial-gradient(circle at center, rgba(255, 0, 128, 0.12) 0%, rgba(255, 0, 128, 0.03) 20%, transparent 42%),
        radial-gradient(circle at center, #180012 0%, #080008 65%, #000 100%);
      transition: opacity .9s ease, visibility .9s ease;
    }

    #startScreen.hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .title {
      font-size: clamp(22px, 7vw, 36px);
      color: #ffb7de;
      font-weight: 700;
      text-align: center;
      padding: 0 18px;
      text-shadow:
        0 0 8px rgba(255, 100, 190, 0.8),
        0 0 24px rgba(255, 0, 128, 0.45);
    }

    .launch-btn {
      width: min(58vw, 180px);
      aspect-ratio: 1 / 1;
      border-radius: 50%;
      border: 4px solid #ff1493;
      background: radial-gradient(circle at center, rgba(255, 20, 147, 0.16) 0%, rgba(255, 20, 147, 0.05) 45%, transparent 70%);
      box-shadow:
        0 0 18px #ff1493,
        0 0 40px rgba(255, 20, 147, 0.65),
        inset 0 0 24px rgba(255, 20, 147, 0.28);
      color: white;
      font-size: clamp(36px, 10vw, 54px);
      display: flex;
      align-items: center;
      justify-content: center;
      animation: pulse 1.8s infinite ease-in-out;
      cursor: pointer;
    }

    .launch-text {
      font-size: clamp(20px, 6vw, 30px);
      color: #ffb1dc;
      letter-spacing: 2px;
      text-align: center;
      text-shadow:
        0 0 10px rgba(255, 20, 147, 0.9),
        0 0 28px rgba(255, 20, 147, 0.35);
    }

    @keyframes pulse {
      0%, 100% {
        transform: scale(1);
      }
      50% {
        transform: scale(1.06);
      }
    }

    /* VIAJE */
    #journeyScreen {
      perspective: 1200px;
      background:
        radial-gradient(circle at center, rgba(255, 0, 140, 0.12) 0%, rgba(255,0,140,0.03) 18%, transparent 38%),
        radial-gradient(circle at center, rgba(60, 0, 80, 0.18) 0%, transparent 60%),
        linear-gradient(to bottom, #040004, #000);
    }

    .nebula {
      position: absolute;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      background:
        radial-gradient(circle at 50% 50%, rgba(255, 0, 128, 0.12) 0%, transparent 18%),
        radial-gradient(circle at 48% 52%, rgba(255, 100, 200, 0.08) 0%, transparent 28%),
        radial-gradient(circle at 52% 48%, rgba(133, 40, 255, 0.06) 0%, transparent 34%);
      filter: blur(18px);
      animation: nebulaPulse 4s ease-in-out infinite;
    }

    @keyframes nebulaPulse {
      0%, 100% { transform: scale(1); opacity: .9; }
      50% { transform: scale(1.08); opacity: 1; }
    }

    .stars {
      position: absolute;
      inset: 0;
      z-index: 2;
      overflow: hidden;
      pointer-events: none;
    }

    .star-line {
      position: absolute;
      top: 50%;
      left: 50%;
      width: var(--w, 2px);
      height: var(--h, 130px);
      border-radius: 999px;
      opacity: 0;
      transform-origin: center center;
      background:
        linear-gradient(
          to bottom,
          rgba(255,255,255,0),
          rgba(255,255,255,.95) 20%,
          rgba(255,182,230,.9) 50%,
          rgba(255,255,255,.25) 78%,
          rgba(255,255,255,0)
        );
      box-shadow:
        0 0 6px rgba(255,255,255,0.9),
        0 0 18px rgba(255, 120, 220, 0.55),
        0 0 30px rgba(255, 0, 150, 0.22);
      animation: starWarp var(--dur, 1.1s) linear forwards;
      filter: blur(var(--blur, 0px));
    }

    @keyframes starWarp {
      0% {
        transform:
          translate(-50%, -50%)
          rotate(var(--angle))
          translateY(0)
          scaleY(.08)
          scaleX(.6);
        opacity: 0;
      }
      8% {
        opacity: .95;
      }
      100% {
        transform:
          translate(-50%, -50%)
          rotate(var(--angle))
          translateY(var(--distance))
          scaleY(2.8)
          scaleX(1.1);
        opacity: 0;
      }
    }

    .spark {
      position: absolute;
      top: 50%;
      left: 50%;
      width: var(--size, 3px);
      height: var(--size, 3px);
      border-radius: 50%;
      background: white;
      box-shadow:
        0 0 8px rgba(255,255,255,0.9),
        0 0 16px rgba(255, 120, 220, 0.55);
      opacity: 0;
      animation: sparkWarp var(--dur, 1.2s) linear forwards;
    }

    @keyframes sparkWarp {
      0% {
        transform: translate(-50%, -50%) rotate(var(--angle)) translateY(0) scale(.2);
        opacity: 0;
      }
      10% {
        opacity: 1;
      }
      100% {
        transform: translate(-50%, -50%) rotate(var(--angle)) translateY(var(--distance)) scale(1.9);
        opacity: 0;
      }
    }

    .tunnel {
      position: absolute;
      inset: 0;
      z-index: 4;
      transform-style: preserve-3d;
      overflow: hidden;
      pointer-events: none;
    }

    .word,
    .photo {
      position: absolute;
      top: 50%;
      left: 50%;
      transform-style: preserve-3d;
    }

    .word-inner {
      color: #ff9dd8;
      font-weight: 700;
      white-space: nowrap;
      font-size: clamp(14px, 4vw, 28px);
      text-shadow:
        0 0 6px rgba(255, 120, 220, 0.95),
        0 0 18px rgba(255, 0, 128, 0.8),
        0 0 34px rgba(255, 0, 128, 0.3);
      animation: flyToViewer linear forwards;
      filter: blur(var(--textBlur, 0px));
    }

    .photo-inner {
      width: clamp(62px, 18vw, 120px);
      aspect-ratio: 1 / 1;
      border-radius: 18px;
      object-fit: cover;
      border: 2px solid rgba(255, 170, 225, 0.85);
      box-shadow:
        0 0 10px rgba(255,255,255,.25),
        0 0 18px rgba(255, 80, 180, 0.55),
        0 0 30px rgba(255, 0, 128, 0.25);
      animation: flyToViewer linear forwards;
      filter: blur(var(--imgBlur, 0px));
      background: #111;
    }

    @keyframes flyToViewer {
      0% {
        transform:
          translate3d(var(--tx), var(--ty), -1200px)
          scale(.12);
        opacity: 0;
      }
      10% {
        opacity: 1;
      }
      100% {
        transform:
          translate3d(var(--txEnd), var(--tyEnd), 700px)
          scale(2.45);
        opacity: 0;
      }
    }

    .center-photo-wrap {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 5;
      pointer-events: none;
    }

    .center-photo {
      width: min(50vw, 230px);
      aspect-ratio: 1 / 1.15;
      object-fit: cover;
      border-radius: 24px;
      border: 2px solid rgba(255, 170, 225, 0.9);
      box-shadow:
        0 0 16px rgba(255,255,255,.15),
        0 0 24px rgba(255, 90, 200, 0.55),
        0 0 44px rgba(255, 0, 128, 0.25);
      opacity: 0;
      transform: scale(.85);
      transition: all 1s ease;
    }

    .center-photo.show {
      opacity: 1;
      transform: scale(1);
    }

    .center-caption {
      position: absolute;
      left: 50%;
      bottom: 13%;
      transform: translateX(-50%);
      width: 100%;
      padding: 0 18px;
      text-align: center;
      font-size: clamp(16px, 5vw, 28px);
      color: #ffb8df;
      font-weight: 700;
      text-shadow:
        0 0 8px rgba(255, 130, 220, 0.95),
        0 0 22px rgba(255, 0, 128, 0.7);
      opacity: 0;
      transition: opacity 1.2s ease;
      z-index: 6;
    }

    .center-caption.show {
      opacity: 1;
    }

    .overlay-glow {
      position: absolute;
      inset: 0;
      z-index: 3;
      pointer-events: none;
      background:
        radial-gradient(circle at center, rgba(255,255,255,0.04) 0%, rgba(255, 140, 220, 0.08) 10%, transparent 24%),
        radial-gradient(circle at center, rgba(255, 0, 140, 0.08) 0%, transparent 40%);
    }

    .hint {
      position: absolute;
      bottom: 26px;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      padding: 0 18px;
      text-align: center;
      font-size: clamp(12px, 3.8vw, 15px);
      color: rgba(255,255,255,0.72);
      z-index: 8;
    }

    @media (max-width: 420px) {
      .center-photo {
        width: min(56vw, 200px);
      }

      .photo-inner {
        border-radius: 14px;
      }
    }
  </style>
</head>
<body>

  <section id="startScreen" class="screen">
    <div class="title">Un viaje espacial de amor 💖</div>
    <button class="launch-btn" id="startBtn">🚀</button>
    <div class="launch-text">EMPEZAR VIAJE</div>
  </section>

  <section id="journeyScreen" class="screen">
    <div class="nebula"></div>
    <div class="stars" id="stars"></div>
    <div class="overlay-glow"></div>
    <div class="tunnel" id="tunnel"></div>

    <div class="center-photo-wrap">
        <img
        id="mainPhoto"
        class="center-photo"
        src="/Angel/Viaje/angel.jpeg"
        alt="Foto bonita"
        />
    </div>

    <div id="mainCaption" class="center-caption">Eres mi lugar favorito 💕</div>
    <div class="hint">Un viaje bonito hecho con amor ✨</div>
  </section>

  <script>
    const startBtn = document.getElementById("startBtn");
    const startScreen = document.getElementById("startScreen");
    const stars = document.getElementById("stars");
    const tunnel = document.getElementById("tunnel");
    const mainPhoto = document.getElementById("mainPhoto");
    const mainCaption = document.getElementById("mainCaption");

    const words = [
      "Mi niña hermosa",
      "Eres mi vida",
      "Mi persona favorita",
      "Te amo muchísimo",
      "Mi universo",
      "Mi lugar favorito",
      "Mi amor bonito",
      "Siempre tú",
      "Mi corazón",
      "Mi princesa",
      "Mi razón favorita",
      "Contigo todo",
      "Eres mi paz",
      "Te adoro",
      "Mi destino",
      "Mi felicidad",
      "Solo tú",
      "Mi estrella",
      "Mi cielo",
      "Tú y yo 💖",
      "Mi amor eterno",
      "Qué bonito amarte",
      "Mi sonrisa favorita",
      "Mi sueño bonito"
    ];

    const images = [
        src="/Angel/Viaje/foto1.jpeg",
        src="/Angel/Viaje/foto2.jpeg",
        src="/Angel/Viaje/foto3.jpeg",
        src="/Angel/Viaje/foto4.jpeg",
        src="/Angel/Viaje/foto5.jpeg"
    ];

    let started = false;
    const timers = [];

    function rand(min, max) {
      return Math.random() * (max - min) + min;
    }

    function createStarLine() {
      const line = document.createElement("div");
      line.className = "star-line";

      const angle = rand(0, 360) + "deg";
      const distance = `${rand(window.innerHeight * 0.75, Math.max(window.innerWidth, window.innerHeight) * 1.45)}px`;
      const width = rand(1.2, 3.2);
      const height = rand(70, 190);
      const dur = rand(0.6, 1.35);
      const blur = rand(0, 0.8);

      line.style.setProperty("--angle", angle);
      line.style.setProperty("--distance", distance);
      line.style.setProperty("--w", `${width}px`);
      line.style.setProperty("--h", `${height}px`);
      line.style.setProperty("--dur", `${dur}s`);
      line.style.setProperty("--blur", `${blur}px`);

      stars.appendChild(line);
      setTimeout(() => line.remove(), dur * 1000 + 120);
    }

    function createSpark() {
      const spark = document.createElement("div");
      spark.className = "spark";

      const angle = rand(0, 360) + "deg";
      const distance = `${rand(window.innerHeight * 0.55, Math.max(window.innerWidth, window.innerHeight) * 1.15)}px`;
      const size = rand(1.5, 4.2);
      const dur = rand(0.8, 1.5);

      spark.style.setProperty("--angle", angle);
      spark.style.setProperty("--distance", distance);
      spark.style.setProperty("--size", `${size}px`);
      spark.style.setProperty("--dur", `${dur}s`);

      stars.appendChild(spark);
      setTimeout(() => spark.remove(), dur * 1000 + 120);
    }

    function createWord() {
      const wrap = document.createElement("div");
      wrap.className = "word";

      const inner = document.createElement("div");
      inner.className = "word-inner";
      inner.textContent = words[Math.floor(Math.random() * words.length)];

      inner.style.setProperty("--tx", `${rand(-44, 44)}vw`);
      inner.style.setProperty("--ty", `${rand(-42, 42)}vh`);
      inner.style.setProperty("--txEnd", `${rand(-15, 15)}vw`);
      inner.style.setProperty("--tyEnd", `${rand(-22, 22)}vh`);
      inner.style.setProperty("--textBlur", `${rand(0, 0.6)}px`);
      inner.style.animationDuration = `${rand(2.2, 3.6)}s`;

      wrap.appendChild(inner);
      tunnel.appendChild(wrap);

      setTimeout(() => wrap.remove(), 3700);
    }

    function createPhoto() {
      const wrap = document.createElement("div");
      wrap.className = "photo";

      const img = document.createElement("img");
      img.className = "photo-inner";
      img.src = images[Math.floor(Math.random() * images.length)];
      img.alt = "amor";

      img.style.setProperty("--tx", `${rand(-42, 42)}vw`);
      img.style.setProperty("--ty", `${rand(-40, 40)}vh`);
      img.style.setProperty("--txEnd", `${rand(-18, 18)}vw`);
      img.style.setProperty("--tyEnd", `${rand(-24, 24)}vh`);
      img.style.setProperty("--imgBlur", `${rand(0, 0.5)}px`);
      img.style.animationDuration = `${rand(2.8, 4.1)}s`;

      wrap.appendChild(img);
      tunnel.appendChild(wrap);

      setTimeout(() => wrap.remove(), 4300);
    }

    function burstStars(amount = 28) {
      for (let i = 0; i < amount; i++) {
        setTimeout(() => {
          createStarLine();
          if (Math.random() > 0.45) createSpark();
        }, i * 28);
      }
    }

    function startJourney() {
      if (started) return;
      started = true;

      startScreen.classList.add("hidden");

      setTimeout(() => {
        mainPhoto.classList.add("show");
        mainCaption.classList.add("show");
      }, 1500);

      burstStars(40);

      timers.push(setInterval(() => {
        createStarLine();
        if (Math.random() > 0.35) createStarLine();
        if (Math.random() > 0.5) createSpark();
      }, 65));

      timers.push(setInterval(() => {
        createWord();
        if (Math.random() > 0.55) createWord();
      }, 260));

      timers.push(setInterval(() => {
        createPhoto();
      }, 1200));
    }

    startBtn.addEventListener("click", startJourney);
  </script>
</body>
</html>
