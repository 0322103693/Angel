<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Para mi amor 💖</title>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Quicksand:wght@500;600;700&display=swap');

    :root {
      --bg1: #ffe5ec;
      --bg2: #ffc2d1;
      --text: #ff4d6d;
      --heart: #ff8fab;
      --bubble: rgba(255, 255, 255, 0.96);
      --shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: 'Quicksand', sans-serif;
    }

    body {
      background: radial-gradient(circle at top, var(--bg1) 0%, var(--bg2) 100%);
    }

    #sky {
      position: relative;
      width: 100%;
      height: 100dvh;
      overflow: hidden;
      isolation: isolate;
    }

    /* NUBES BONITAS FLOTANDO */
    .cloud {
      position: absolute;
      left: -220px;
      background: rgba(255,255,255,0.9);
      border-radius: 999px;
      box-shadow: 0 8px 18px rgba(0,0,0,0.04);
      z-index: 1;
      animation: floatCloud linear forwards;
      will-change: transform;
    }

    .cloud::before,
    .cloud::after {
      content: "";
      position: absolute;
      background: inherit;
      border-radius: 50%;
    }

    .cloud::before {
      width: 42%;
      height: 135%;
      left: 14%;
      top: -58%;
    }

    .cloud::after {
      width: 34%;
      height: 105%;
      right: 14%;
      top: -38%;
    }

    @keyframes floatCloud {
      from {
        transform: translateX(0);
      }
      to {
        transform: translateX(calc(100vw + 280px));
      }
    }

    /* MENSAJES */
    .message {
      position: absolute;
      z-index: 10;
      background: var(--bubble);
      color: var(--text);
      padding: 10px 16px;
      border-radius: 999px;
      box-shadow: var(--shadow);
      font-weight: 700;
      font-size: clamp(12px, 3.5vw, 20px);
      line-height: 1.2;
      text-align: center;
      max-width: min(78vw, 310px);
      white-space: normal;
      word-break: break-word;
      overflow-wrap: break-word;
      pointer-events: none;
      animation: popFade var(--duration, 6.5s) ease-in-out forwards;
      opacity: 0;
      will-change: transform, opacity;
    }

    @keyframes popFade {
      0% {
        transform: scale(0.7) translateY(20px);
        opacity: 0;
      }
      12% {
        transform: scale(1.05) translateY(0);
        opacity: 1;
      }
      25% {
        transform: scale(1);
        opacity: 1;
      }
      82% {
        transform: scale(1) translateY(-8px);
        opacity: 1;
      }
      100% {
        transform: scale(0.9) translateY(-28px);
        opacity: 0;
      }
    }

    /* CORAZONES */
    .heart {
      position: absolute;
      z-index: 2;
      pointer-events: none;
      color: var(--heart);
      opacity: 0;
      animation: floatHeart linear forwards;
      filter: drop-shadow(0 4px 8px rgba(255, 105, 135, 0.18));
      will-change: transform, opacity;
    }

    @keyframes floatHeart {
      0% {
        transform: translateY(110dvh) scale(0.6) rotate(0deg);
        opacity: 0;
      }
      15% {
        opacity: 0.75;
      }
      100% {
        transform: translateY(-15dvh) scale(1.3) rotate(16deg);
        opacity: 0;
      }
    }

    /* MOVIL */
    @media (max-width: 768px) {
      .message {
        max-width: 76vw;
        padding: 9px 14px;
        font-size: clamp(12px, 4vw, 17px);
      }
    }

    @media (max-width: 420px) {
      .message {
        max-width: 74vw;
        padding: 8px 13px;
        font-size: clamp(11px, 4.2vw, 15px);
      }
    }

    @media (max-height: 500px) and (orientation: landscape) {
      .message {
        max-width: 40vw;
        font-size: 12px;
      }
    }
  </style>
</head>
<body>
  <div id="sky"></div>

  <script>
    const sky = document.getElementById("sky");

    const phrases = [
      "Te amo muchísimo 💖",
      "Eres mi lugar favorito",
      "Mi niña hermosa 🌸",
      "Eres mi vida ✨",
      "Siempre contigo 💍",
      "Gracias por existir 💕",
      "Eres mi mundo 🌎",
      "Mi princesa hermosa 👑",
      "Tu sonrisa me enamora 😍",
      "Eres mi felicidad",
      "Cada día te amo más",
      "Mi corazón es tuyo ❤️",
      "Contigo todo es bonito",
      "Mi pedacito de cielo ☁️",
      "Eres el amor de mi vida",
      "Me haces muy feliz 😊",
      "Te quiero infinito ♾️",
      "No te cambio por nada",
      "Besitos para ti 💋",
      "Eres mi sol ☀️",
      "Eres magia ✨",
      "Tú y yo por siempre",
      "Me encantas demasiado",
      "Mi todo 💖",
      "Mi amor bonito",
      "Eres mi sueño hecho realidad",
      "Mi niña preciosa",
      "Te adoro con todo mi corazón",
      "Eres lo mejor de mi vida",
      "Me haces sonreír siempre",
      "Mi persona favorita",
      "Eres mi paz 🤍",
      "Mi corazón late por ti",
      "Siempre te escogería a ti",
      "Qué bonito es amarte",
      "Eres un regalo en mi vida",
      "Te amo con toda mi alma",
      "A tu lado todo es mejor",
      "Eres mi razón favorita"
    ];

    const isSmallPhone = window.innerWidth <= 420;
    const isMobile = window.innerWidth <= 768;

    let activeMessages = 0;
    let activeHearts = 0;
    let activeClouds = 0;

    const limits = {
      messages: isSmallPhone ? 10 : isMobile ? 13 : 18,
      hearts: isSmallPhone ? 14 : isMobile ? 18 : 26,
      clouds: isSmallPhone ? 6 : isMobile ? 8 : 10
    };

    function rand(min, max) {
      return Math.random() * (max - min) + min;
    }

    function createCloud() {
      if (activeClouds >= limits.clouds) return;
      activeClouds++;

      const cloud = document.createElement("div");
      cloud.className = "cloud";

      const width = isSmallPhone
        ? rand(70, 130)
        : isMobile
        ? rand(90, 160)
        : rand(120, 220);

      const height = width * 0.34;
      const top = rand(2, 84);
      const duration = rand(16, 30);

      cloud.style.width = `${width}px`;
      cloud.style.height = `${height}px`;
      cloud.style.top = `${top}%`;
      cloud.style.opacity = rand(0.45, 0.92);
      cloud.style.animationDuration = `${duration}s`;

      sky.appendChild(cloud);

      setTimeout(() => {
        cloud.remove();
        activeClouds--;
      }, duration * 1000);
    }

    function createMessage() {
      if (activeMessages >= limits.messages) return;
      activeMessages++;

      const msg = document.createElement("div");
      msg.className = "message";
      msg.textContent = phrases[Math.floor(Math.random() * phrases.length)];
      msg.style.setProperty("--duration", `${rand(5.5, 7.8)}s`);

      sky.appendChild(msg);

      const rect = msg.getBoundingClientRect();
      const margin = 10;

      const maxLeft = Math.max(margin, window.innerWidth - rect.width - margin);
      const maxTop = Math.max(margin, window.innerHeight - rect.height - margin);

      msg.style.left = `${rand(margin, maxLeft)}px`;
      msg.style.top = `${rand(margin, maxTop)}px`;

      setTimeout(() => {
        msg.remove();
        activeMessages--;
      }, 7800);
    }

    function createHeart() {
      if (activeHearts >= limits.hearts) return;
      activeHearts++;

      const heart = document.createElement("div");
      heart.className = "heart";
      heart.innerHTML = "💗";

      const duration = rand(4.5, 6.5);
      const size = isSmallPhone ? rand(14, 22) : rand(16, 28);

      heart.style.left = `${rand(0, 100)}vw`;
      heart.style.fontSize = `${size}px`;
      heart.style.animationDuration = `${duration}s`;

      sky.appendChild(heart);

      setTimeout(() => {
        heart.remove();
        activeHearts--;
      }, duration * 1000);
    }

    function startScene() {
      const initialClouds = isSmallPhone ? 4 : 6;
      const initialMessages = isSmallPhone ? 6 : 8;

      for (let i = 0; i < initialClouds; i++) {
        setTimeout(createCloud, i * 500);
      }

      for (let i = 0; i < initialMessages; i++) {
        setTimeout(createMessage, i * 180);
      }

      setInterval(createCloud, isSmallPhone ? 1800 : 1500);
      setInterval(createMessage, isSmallPhone ? 650 : isMobile ? 520 : 420);
      setInterval(createHeart, isSmallPhone ? 700 : 550);
    }

    startScene();
  </script>
</body>
</html>
