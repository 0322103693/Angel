<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para mi amor 💖</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Quicksand:wght@600&display=swap');

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #ffc2d1; /* Rosa suave */
            background: radial-gradient(circle, #ffe5ec 0%, #ffc2d1 100%);
            font-family: 'Quicksand', sans-serif;
        }

        /* Nubes Estilizadas */
        .cloud {
            position: absolute;
            background: #fff;
            border-radius: 100px;
            box-shadow: 0 8px 15px rgba(0,0,0,0.05);
            z-index: 1;
            opacity: 0.9;
            animation: move linear infinite;
        }

        .cloud::after, .cloud::before {
            content: '';
            position: absolute;
            background: #fff;
            border-radius: 50%;
        }

        .cloud::after { width: 50%; height: 140%; top: -60%; left: 15%; }
        .cloud::before { width: 40%; height: 110%; top: -40%; right: 15%; }

        @keyframes move {
            from { transform: translateX(-300px); }
            to { transform: translateX(calc(100vw + 300px)); }
        }

        /* Nubes del fondo (piso) */
        .bottom-cloud {
            position: absolute;
            bottom: -50px;
            background: white;
            border-radius: 50%;
            filter: blur(10px);
            z-index: 5;
        }

        /* Burbujas de Mensaje */
        .message {
            position: absolute;
            background: white;
            padding: 10px 22px;
            border-radius: 30px;
            box-shadow: 0 6px 20px rgba(0,0,0,0.08);
            color: #ff4d6d;
            font-size: clamp(12px, 4vw, 18px);
            white-space: nowrap;
            z-index: 10;
            display: flex;
            align-items: center;
            gap: 8px;
            pointer-events: none;
            animation: popAndFade 6s ease-in-out forwards;
        }

        @keyframes popAndFade {
            0% { transform: scale(0) translateY(20px); opacity: 0; }
            15% { transform: scale(1.1) translateY(0); opacity: 1; }
            25% { transform: scale(1); }
            80% { opacity: 1; transform: scale(1) translateY(-10px); }
            100% { transform: scale(0.8) translateY(-40px); opacity: 0; }
        }

        /* Corazones Flotantes */
        .heart {
            position: absolute;
            color: #ff758f;
            z-index: 2;
            animation: floatHeart 5s linear forwards;
            pointer-events: none;
        }

        @keyframes floatHeart {
            0% { transform: translateY(110vh) scale(0.5); opacity: 0; }
            20% { opacity: 0.7; }
            100% { transform: translateY(-10vh) rotate(45deg) scale(1.5); opacity: 0; }
        }

    </style>
</head>
<body>

    <div id="sky"></div>

    <script>
        const sky = document.getElementById('sky');

        const phrases = [
            "Te amo mi huestios❤️", "Eres mi vida ✨", "Mi niña hermosa 🌸", "Siempre juntos 💍", 
            "Gracias por existir", "Eres mi mundo 🌎", "Mi niña consentida 🧸",
            "Tu sonrisa me mata 😍", "I Love You ❤️", "Cada día te amo más",
            "Eres mi lugar favorito", "Contigo para siempre", "Mi pedacito de cielo",
            "Eres el amor de mi vida", "Me haces muy feliz 😊", "Te quiero infinito",
            "Mi reina 👑", "No te cambio por nada", "Besitos para ti 💋",
            "Eres mi sol ☀️", "Eres magia ✨", "Tú y yo por siempre",
            "Me encantas demasiado", "Mi todo 💖"
        ];

        // Crear nubes en el suelo para que se vea como la imagen
        function createBottomDecor() {
            for(let i=0; i<15; i++) {
                const bCloud = document.createElement('div');
                bCloud.className = 'bottom-cloud';
                const size = 150 + Math.random() * 200;
                bCloud.style.width = size + 'px';
                bCloud.style.height = size + 'px';
                bCloud.style.left = (i * 8) + 'vw';
                sky.appendChild(bCloud);
            }
        }

        // Crear nubes que flotan
        function createCloud() {
            const cloud = document.createElement('div');
            cloud.className = 'cloud';
            const w = 150 + Math.random() * 150;
            cloud.style.width = w + 'px';
            cloud.style.height = (w/3) + 'px';
            cloud.style.top = Math.random() * 70 + 'vh';
            cloud.style.animationDuration = (20 + Math.random() * 30) + 's';
            cloud.style.opacity = 0.5 + Math.random() * 0.4;
            sky.appendChild(cloud);
            setTimeout(() => cloud.remove(), 50000);
        }

        // Crear mensajes (Intervalo rápido para llenar la pantalla)
        function createMessage() {
            const msg = document.createElement('div');
            msg.className = 'message';
            msg.innerText = phrases[Math.floor(Math.random() * phrases.length)];
            
            // Posiciones aleatorias por toda la pantalla
            msg.style.left = Math.random() * 75 + 5 + 'vw';
            msg.style.top = Math.random() * 75 + 5 + 'vh';
            
            sky.appendChild(msg);
            setTimeout(() => msg.remove(), 6000);
        }

        // Crear corazones
        function createHeart() {
            const heart = document.createElement('div');
            heart.className = 'heart';
            heart.innerHTML = '❤️';
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.fontSize = (15 + Math.random() * 20) + 'px';
            sky.appendChild(heart);
            setTimeout(() => heart.remove(), 5000);
        }

        // Ejecución
        createBottomDecor();
        
        // Generar elementos constantemente
        setInterval(createMessage, 600); // Un mensaje nuevo cada medio segundo
        setInterval(createHeart, 400);   // Corazones frecuentes
        setInterval(createCloud, 5000);  // Nubes ocasionales

        // Empezar con algunos mensajes ya en pantalla
        for(let i=0; i<8; i++) {
            setTimeout(createMessage, i * 200);
            createCloud();
        }

    </script>
</body>
</html>
